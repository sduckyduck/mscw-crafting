name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Copy local icon PNGs into Pages output
        shell: bash
        run: |
          mkdir -p dist/icons
          cp -f smithing_icon.png dist/icons/smithing_icon.png 2>/dev/null || true
          cp -f weapon_crafting_icon.png dist/icons/weapon_crafting_icon.png 2>/dev/null || true
          cp -f tailoring_icon.png dist/icons/tailoring_icon.png 2>/dev/null || true
          cp -f leatherworking_icon.png dist/icons/leatherworking_icon.png 2>/dev/null || true
          cp -f woodcrafting_icon.png dist/icons/woodcrafting_icon.png 2>/dev/null || true
          cp -f "arcforge _icon.png" dist/icons/arcforge_icon.png 2>/dev/null || true
          cp -f arcforge_icon.png dist/icons/arcforge_icon.png 2>/dev/null || true
          cp -f processed_leather.png dist/icons/processed_leather.png 2>/dev/null || true
          cp -f processed_parchment.png dist/icons/processed_parchment.png 2>/dev/null || true
          cp -f spool_of_thread.png dist/icons/spool_of_thread.png 2>/dev/null || true
          cp -f animal_fur_bundle.png dist/icons/animal_fur_bundle.png 2>/dev/null || true
          echo "dist/icons files:"
          find dist/icons -maxdepth 1 -type f | sort

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -d dist/icons

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
